services:
  valkey:
    image: valkey/valkey-bundle
    container_name: nba_cache
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - valkey_data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "[ping]"]
      interval: 5s
      timeout: 3s
      retries: 3

  api:
    build: ./python-service
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./python-service:/app
      - /app/.venv
      - /app/__pycache__
    environment:
      - UV_PROJECT_ENVIRONMENT=/app/.venv

  bot:
    build: ./bot
    depends_on:
      - api
    env_file: .env
    volumes:
      - ./bot:/app
      - /app/node_modules

  design:
    image: structurizr/lite
    ports:
      - "8080:8080"
    volumes:
      - ./structurizr:/usr/local/structurizr

volumes:
  valkey_data:
